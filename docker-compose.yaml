name: book-system
services:
  db:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: booksystem
      MARIADB_USER: bookuser
      MARIADB_PASSWORD: bookpassword
      TZ: "Asia/Tokyo"
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
volumes:
  db_data:
