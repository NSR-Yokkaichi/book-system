name: book-system
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: booksystem
      POSTGRES_USER: bookuser
      TZ: "Asia/Tokyo"
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      - db
volumes:
  db_data:

networks:
  booksystem:
    driver: bridge
