---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secret
  namespace: book-system
spec:
  encryptedData:
    BETTER_AUTH_SECRET: 
    BETTER_AUTH_URL: 
    DATABASE_URL: 
    GOOGLE_CLIENT_ID: 
    GOOGLE_CLIENT_SECRET: 
    NEXT_PUBLIC_BETTER_AUTH_URL: 
  template:
    metadata:
      name: app-secret
      namespace: book-system
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secret
  namespace: book-system
spec:
  encryptedData:
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      name: postgres-secret
      namespace: book-system
    type: Opaque
